name: Build and Push

on:
  push:
    branches:
      - main
      - staging
    paths:
      - 'Dockerfile'
      - 'go.mod'
      - 'go.sum'
      - 'cmd/**'
      - 'internal/**'
      - 'client/**'
      - 'db/init.sql'
      - 'helm/**'
      - '.github/workflows/build.yml'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - staging
    paths:
      - 'Dockerfile'
      - 'go.mod'
      - 'go.sum'
      - 'cmd/**'
      - 'internal/**'
      - 'client/**'
      - 'db/init.sql'
      - 'helm/**'
      - '.github/workflows/build.yml'

# Serialize runs per ref so two quick merges to the same branch cannot race:
# without this, both runs compute the same next version from the same latest
# tag and clobber each other's image/tag. Queue rather than cancel so an
# in-flight image push is never interrupted.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ${{ github.ref == 'refs/heads/staging' && 'arc-runner' || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  compute-version:
    runs-on: ${{ github.ref == 'refs/heads/staging' && 'arc-runner' || 'ubuntu-latest' }}
    needs: test
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_tag: ${{ steps.version.outputs.should_tag }}
      platforms: ${{ steps.platforms.outputs.platforms }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            VERSION="${VERSION##v}"  # Strip all leading v's
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "should_tag=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            # Get latest tag
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            VERSION="${LATEST_TAG##v}"  # Strip all leading v's

            # Parse semantic version
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)

            # Check commit messages since last tag
            COMMITS=$(git log ${LATEST_TAG}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

            if echo "$COMMITS" | grep -qiE "^(breaking|major):"; then
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
            elif echo "$COMMITS" | grep -qiE "^(feat|feature|minor):"; then
              MINOR=$((MINOR + 1))
              PATCH=0
            elif echo "$COMMITS" | grep -qiE "^(fix|patch|chore|docs|refactor):"; then
              PATCH=$((PATCH + 1))
            else
              # Default to patch bump if no conventional commit prefix
              PATCH=$((PATCH + 1))
            fi

            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "should_tag=true" >> $GITHUB_OUTPUT

          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            VERSION="staging-${{ github.run_number }}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "should_tag=false" >> $GITHUB_OUTPUT

          else
            VERSION="${GITHUB_SHA::8}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "should_tag=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine build platforms
        id: platforms
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo 'platforms=["linux/amd64"]' >> $GITHUB_OUTPUT
          else
            echo 'platforms=["linux/amd64","linux/arm64"]' >> $GITHUB_OUTPUT
          fi

  create-tag:
    runs-on: ${{ github.ref == 'refs/heads/staging' && 'arc-runner' || 'ubuntu-latest' }}
    # Only push the git tag once the image artifact actually exists, so a build
    # failure (e.g. a client tsc error caught inside the Docker build) never
    # leaves a dangling version tag with no corresponding image or release.
    needs: [compute-version, create-manifest]
    if: needs.compute-version.outputs.should_tag == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ needs.compute-version.outputs.version }}" -m "Release v${{ needs.compute-version.outputs.version }}"
          git push origin "v${{ needs.compute-version.outputs.version }}"

  build-and-push:
    runs-on: ${{ github.ref == 'refs/heads/staging' && 'arc-runner' || 'ubuntu-latest' }}
    needs: compute-version
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform: ${{ fromJson(needs.compute-version.outputs.platforms) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        if: matrix.platform != 'linux/amd64'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.compute-version.outputs.version }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_VERSION=${{ needs.compute-version.outputs.version }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Disable SLSA provenance / SBOM attestations. They are pushed as
          # extra manifest entries that show up as "unknown/unknown" platforms
          # on the GHCR package page (one per built arch), cluttering it.
          provenance: false
          sbom: false

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  create-manifest:
    runs-on: ${{ github.ref == 'refs/heads/staging' && 'arc-runner' || 'ubuntu-latest' }}
    needs: [compute-version, build-and-push]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"

          # Build docker buildx imagetools create command with all digests
          TAGS=()
          TAGS+=("${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}")

          # Add 'latest' tag only for main branch non-staging releases
          if [[ "${{ github.ref }}" == "refs/heads/main" ]] && [[ ! "$VERSION" =~ ^staging- ]]; then
            TAGS+=("${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest")
          fi

          # Build list of image references from digests
          IMAGES=()
          for digest in *; do
            IMAGES+=("${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:${digest}")
          done

          # Create manifest with all tags
          for tag in "${TAGS[@]}"; do
            docker buildx imagetools create \
              $(printf -- '--tag %s ' "$tag") \
              "${IMAGES[@]}"
          done

      - name: Inspect image
        run: |
          docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.compute-version.outputs.version }}

  create-release:
    runs-on: ${{ github.ref == 'refs/heads/staging' && 'arc-runner' || 'ubuntu-latest' }}
    # Runs after create-tag so the release always references a tag that was
    # pushed only after the image artifact exists (create-tag needs the
    # manifest, so this transitively runs after create-manifest too).
    needs: [compute-version, create-tag]
    if: needs.compute-version.outputs.should_tag == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="v${{ needs.compute-version.outputs.version }}"

          # Find the previous tag (the one before our new tag)
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${VERSION}$" | head -1)

          # Generate grouped changelog with git-cliff for the range
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git-cliff --config cliff.toml --latest --strip header 2>/dev/null || echo "")
          else
            CHANGES=$(git-cliff --config cliff.toml "${PREV_TAG}..${VERSION}" --strip header 2>/dev/null || echo "")
          fi

          # Fallback to flat commit list if git-cliff produced no output
          if [ -z "$CHANGES" ]; then
            if [ -n "$PREV_TAG" ]; then
              CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
            else
              CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges)
            fi
          fi

          cat <<EOF > changelog.md
          ## Docker Images

          \`\`\`bash
          docker pull ghcr.io/${{ github.repository }}:${{ needs.compute-version.outputs.version }}
          # or
          docker pull ghcr.io/${{ github.repository }}:latest
          \`\`\`

          **Architectures:** \`linux/amd64\`, \`linux/arm64\`

          ---

          ${CHANGES}

          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${VERSION}
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.compute-version.outputs.version }}
          name: Release v${{ needs.compute-version.outputs.version }}
          body_path: changelog.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-helm:
    runs-on: ${{ github.ref == 'refs/heads/staging' && 'arc-runner' || 'ubuntu-latest' }}
    needs: [compute-version, create-manifest]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Determine channel
        id: channel
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "channel=stable" >> $GITHUB_OUTPUT
            echo "path=." >> $GITHUB_OUTPUT
          else
            echo "channel=staging" >> $GITHUB_OUTPUT
            echo "path=staging" >> $GITHUB_OUTPUT
          fi

      - name: Update chart versions
        run: |
          APP_VERSION="${{ needs.compute-version.outputs.version }}"

          # Update appVersion to match container version
          sed -i "s/^appVersion: .*/appVersion: \"${APP_VERSION}\"/" helm/schautrack/Chart.yaml

          # Calculate chart version
          if [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            # For staging: use 0.0.N format (e.g., 0.0.84)
            # This avoids prerelease format which helm search hides by default
            CHART_VERSION="0.0.${{ github.run_number }}"
            sed -i "s/^version: .*/version: ${CHART_VERSION}/" helm/schautrack/Chart.yaml
          else
            sed -i "s/^version: .*/version: ${APP_VERSION}/" helm/schautrack/Chart.yaml
          fi

          echo "Updated Chart.yaml:"
          cat helm/schautrack/Chart.yaml

      - name: Package Helm chart
        run: |
          mkdir -p .helm-packages
          helm package helm/schautrack -d .helm-packages

      - name: Checkout gh-pages
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          path: gh-pages

      - name: Update Helm repo
        run: |
          CHANNEL_PATH="gh-pages/${{ steps.channel.outputs.path }}"
          mkdir -p "$CHANNEL_PATH"

          # Ensure .nojekyll exists to prevent Jekyll processing
          touch gh-pages/.nojekyll

          # Remove stale .tgz files to prevent cross-channel contamination
          # (helm repo index scans all .tgz in the directory and adds them to the index)
          rm -f "$CHANNEL_PATH"/*.tgz

          # Copy only the new package
          cp .helm-packages/*.tgz "$CHANNEL_PATH/"

          # Update or create index (--merge preserves previous valid entries)
          if [ -f "$CHANNEL_PATH/index.yaml" ]; then
            helm repo index "$CHANNEL_PATH" --url "https://helm.schautrack.com/${{ steps.channel.outputs.path }}" --merge "$CHANNEL_PATH/index.yaml"
          else
            helm repo index "$CHANNEL_PATH" --url "https://helm.schautrack.com/${{ steps.channel.outputs.path }}"
          fi

      - name: Push to gh-pages
        run: |
          cd gh-pages
          git add .
          git commit -m "Update Helm chart (${{ steps.channel.outputs.channel }}) - appVersion ${{ needs.compute-version.outputs.version }}" || exit 0
          git push

  notify-argocd:
    runs-on: ${{ github.ref == 'refs/heads/staging' && 'arc-runner' || 'ubuntu-latest' }}
    needs: [compute-version, publish-helm]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    permissions:
      contents: write # push an empty gh-pages commit when a Pages deployment fails
    steps:
      - name: Determine ArgoCD application
        id: app
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "name=schautrack-prod" >> $GITHUB_OUTPUT
          else
            echo "name=schautrack-staging" >> $GITHUB_OUTPUT
          fi

      - name: Wait for Helm chart on GitHub Pages
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            VERSION="0.0.${{ github.run_number }}"
            URL="https://helm.schautrack.com/staging/index.yaml"
          else
            VERSION="${{ needs.compute-version.outputs.version }}"
            URL="https://helm.schautrack.com/index.yaml"
          fi
          # GitHub Pages rebuilds the custom-domain CDN asynchronously after the
          # gh-pages push, and *queues* deployments when several pushes land
          # close together, so propagation can take well over the old 450s.
          # Wait generously, but DO NOT fail the release if it is slow: the
          # image and Helm chart are already published, and ArgoCD polls the
          # Helm repo on its own interval (~3m), so the deploy still happens.
          # This step is only a best-effort accelerator for the refresh below.
          MAX_ATTEMPTS=180   # 180 * 5s = 15m
          for i in $(seq 1 $MAX_ATTEMPTS); do
            if curl -sf "$URL?_=$(date +%s)" | grep -q "version: $VERSION"; then
              echo "Chart version $VERSION is live on GitHub Pages"
              exit 0
            fi
            # A Pages deployment can fail outright with "Deployment failed,
            # try again later." (three times on 2026-07-03) and GitHub never
            # retries it on its own. Deployments are cached per gh-pages
            # commit SHA, so re-requesting a build of the SAME commit
            # (POST /pages/builds) fails instantly with the cached result —
            # verified 2026-07-03. Only a NEW commit gets a fresh deployment,
            # so push an empty one, once, 5 minutes in.
            if [[ $i -eq 60 ]]; then
              echo "Chart still not visible — pushing an empty gh-pages commit to force a fresh Pages deployment"
              {
                git clone --quiet --depth 1 --branch gh-pages \
                  "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" \
                  "$RUNNER_TEMP/ghpages-kick" &&
                git -C "$RUNNER_TEMP/ghpages-kick" \
                  -c user.name="github-actions[bot]" \
                  -c user.email="github-actions[bot]@users.noreply.github.com" \
                  commit --allow-empty -m "chore: retrigger failed Pages deployment" &&
                git -C "$RUNNER_TEMP/ghpages-kick" push --quiet origin HEAD:gh-pages
              } || echo "gh-pages kick failed (non-fatal); continuing to wait"
            fi
            echo "Waiting for GitHub Pages to serve $VERSION... ($i/$MAX_ATTEMPTS)"
            sleep 5
          done
          echo "::warning::Chart $VERSION not visible on GitHub Pages after $((MAX_ATTEMPTS * 5))s; not failing the release — ArgoCD will pick it up on its next poll."
          exit 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Best-effort: nudge ArgoCD to sync immediately instead of waiting for its
      # poll. A transient ArgoCD hiccup must not red an already-published release.
      - name: Refresh ArgoCD application (best-effort)
        continue-on-error: true
        run: |
          curl -sSf -X GET \
            "${{ secrets.ARGOCD_SERVER }}/api/v1/applications/${{ steps.app.outputs.name }}?refresh=normal" \
            -H "Authorization: Bearer ${{ secrets.ARGOCD_AUTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -o /dev/null -w "ArgoCD refresh: HTTP %{http_code}\n"
