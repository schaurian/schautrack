name: Cleanup Container Images

on:
  schedule:
    - cron: '0 3 * * 0'  # Every Sunday at 3:00 UTC
  workflow_dispatch:

jobs:
  cleanup:
    name: Delete old container images
    runs-on: arc-runner
    permissions:
      packages: write
    env:
      PACKAGE: schautrack
      OWNER: ${{ github.repository_owner }}
      KEEP_STAGING: 5
      KEEP_SHA_DAYS: 7
    steps:
      - name: Delete untagged images older than 1 day
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Cleaning up untagged images ==="
          CUTOFF=$(date -u -d '1 day ago' +%Y-%m-%dT%H:%M:%SZ)

          # Fetch all versions (paginated)
          PAGE=1
          DELETED=0
          while true; do
            VERSIONS=$(gh api \
              "/users/${OWNER}/packages/container/${PACKAGE}/versions?per_page=100&page=${PAGE}" \
              2>/dev/null) || break

            COUNT=$(echo "$VERSIONS" | jq length)
            [ "$COUNT" -eq 0 ] && break

            # Filter untagged versions older than cutoff
            IDS=$(echo "$VERSIONS" | jq -r \
              --arg cutoff "$CUTOFF" \
              '.[] | select(.metadata.container.tags | length == 0) | select(.updated_at < $cutoff) | .id')

            for ID in $IDS; do
              echo "Deleting untagged version $ID"
              gh api --method DELETE \
                "/users/${OWNER}/packages/container/${PACKAGE}/versions/${ID}" \
                2>/dev/null && DELETED=$((DELETED + 1)) || echo "  Failed to delete $ID"
            done

            [ "$COUNT" -lt 100 ] && break
            PAGE=$((PAGE + 1))
          done
          echo "Deleted $DELETED untagged images"

      - name: Delete old staging images (keep ${{ env.KEEP_STAGING }} most recent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Cleaning up old staging images ==="

          # Collect all staging versions across pages
          PAGE=1
          ALL_STAGING="[]"
          while true; do
            VERSIONS=$(gh api \
              "/users/${OWNER}/packages/container/${PACKAGE}/versions?per_page=100&page=${PAGE}" \
              2>/dev/null) || break

            COUNT=$(echo "$VERSIONS" | jq length)
            [ "$COUNT" -eq 0 ] && break

            # Filter to staging-tagged versions
            STAGING=$(echo "$VERSIONS" | jq \
              '[.[] | select(.metadata.container.tags | any(startswith("staging-")))]')
            ALL_STAGING=$(echo "$ALL_STAGING $STAGING" | jq -s 'add')

            [ "$COUNT" -lt 100 ] && break
            PAGE=$((PAGE + 1))
          done

          TOTAL=$(echo "$ALL_STAGING" | jq length)
          echo "Found $TOTAL staging images"

          if [ "$TOTAL" -le "$KEEP_STAGING" ]; then
            echo "Nothing to delete (keeping ${KEEP_STAGING})"
            exit 0
          fi

          # Sort by updated_at descending, skip the newest N, delete the rest
          IDS=$(echo "$ALL_STAGING" | jq -r \
            --argjson keep "$KEEP_STAGING" \
            'sort_by(.updated_at) | reverse | .[$keep:] | .[].id')

          DELETED=0
          for ID in $IDS; do
            TAGS=$(echo "$ALL_STAGING" | jq -r \
              --argjson id "$ID" \
              '.[] | select(.id == $id) | .metadata.container.tags | join(", ")')
            echo "Deleting staging version $ID ($TAGS)"
            gh api --method DELETE \
              "/users/${OWNER}/packages/container/${PACKAGE}/versions/${ID}" \
              2>/dev/null && DELETED=$((DELETED + 1)) || echo "  Failed to delete $ID"
          done
          echo "Deleted $DELETED staging images (kept newest ${KEEP_STAGING})"

      - name: Delete SHA-tagged branch/PR images older than ${{ env.KEEP_SHA_DAYS }} days
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Cleaning up SHA-tagged branch/PR images ==="
          # build.yml tags images built for non-main/non-staging refs (PRs and
          # other branches) with the 8-char commit SHA (VERSION="${GITHUB_SHA::8}"),
          # and these accumulate in GHCR forever. Delete versions whose *every* tag
          # is an 8-hex-char lowercase SHA and that are older than the cutoff.
          # Release tags (semver like "2.3.5"), "latest", and "staging-*" all
          # contain dots/letters/dashes and never match ^[0-9a-f]{8}$, so they are
          # preserved; a SHA-tagged version that also carries a kept tag is skipped.
          CUTOFF=$(date -u -d "${KEEP_SHA_DAYS} days ago" +%Y-%m-%dT%H:%M:%SZ)

          PAGE=1
          DELETED=0
          while true; do
            VERSIONS=$(gh api \
              "/users/${OWNER}/packages/container/${PACKAGE}/versions?per_page=100&page=${PAGE}" \
              2>/dev/null) || break

            COUNT=$(echo "$VERSIONS" | jq length)
            [ "$COUNT" -eq 0 ] && break

            # Select versions whose tags are all 8-hex-char SHAs (and non-empty),
            # older than the cutoff.
            IDS=$(echo "$VERSIONS" | jq -r \
              --arg cutoff "$CUTOFF" \
              '.[]
               | select(.metadata.container.tags | length > 0 and all(test("^[0-9a-f]{8}$")))
               | select(.updated_at < $cutoff)
               | .id')

            for ID in $IDS; do
              TAGS=$(echo "$VERSIONS" | jq -r \
                --argjson id "$ID" \
                '.[] | select(.id == $id) | .metadata.container.tags | join(", ")')
              echo "Deleting SHA-tagged version $ID ($TAGS)"
              gh api --method DELETE \
                "/users/${OWNER}/packages/container/${PACKAGE}/versions/${ID}" \
                2>/dev/null && DELETED=$((DELETED + 1)) || echo "  Failed to delete $ID"
            done

            [ "$COUNT" -lt 100 ] && break
            PAGE=$((PAGE + 1))
          done
          echo "Deleted $DELETED SHA-tagged images (older than ${KEEP_SHA_DAYS} days)"
